<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Databricks Bingo — Player Card</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --db-red: #FF3621;
    --db-dark: #1B3139;
    --db-gray: #F5F5F5;
    --db-white: #FFFFFF;
    --db-green: #2EA44F;
    --db-red-light: #FFE8E5;
    --db-green-light: #DCFFE4;
    --db-gold: #FFD700;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: var(--db-gray);
    color: var(--db-dark);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--db-dark);
    color: var(--db-white);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 1.25rem; font-weight: 700; }
  header .badge {
    background: var(--db-green);
    color: white;
    font-size: 0.75rem;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  header .back-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  header .back-btn:hover { background: rgba(255,255,255,0.1); }

  /* ── Landing (removed — player file goes straight to card) ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    border: none;
    border-radius: var(--radius);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
  .btn:active { transform: translateY(0); }
  .btn-primary { background: var(--db-red); color: white; }
  .btn-secondary { background: var(--db-dark); color: white; }
  .btn-outline {
    background: transparent;
    border: 2px solid var(--db-dark);
    color: var(--db-dark);
  }
  .btn-sm { padding: 8px 16px; font-size: 0.85rem; }
  .btn-bingo {
    background: var(--db-red);
    color: white;
    font-size: 1.3rem;
    padding: 16px 48px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── Player View ── */
  #player { display: block; }
  .player-container {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* ── Bingo Card ── */
  .bingo-header {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    width: 100%;
    max-width: 560px;
  }
  .bingo-header-cell {
    text-align: center;
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--db-red);
    padding: 8px 0;
  }

  .bingo-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    width: 100%;
    max-width: 560px;
  }

  .bingo-cell {
    aspect-ratio: 1;
    background: var(--db-white);
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    line-height: 1.2;
    word-break: break-word;
  }
  .bingo-cell:hover { border-color: var(--db-red); }

  .bingo-cell.marked {
    background: var(--db-dark);
    color: var(--db-white);
    border-color: var(--db-dark);
  }
  .bingo-cell.marked::after {
    content: '';
    position: absolute;
    top: 4px;
    right: 4px;
    width: 10px;
    height: 10px;
    background: var(--db-red);
    border-radius: 50%;
  }

  .bingo-cell.free {
    background: var(--db-red);
    color: var(--db-white);
    border-color: var(--db-red);
    font-size: 0.9rem;
    cursor: default;
  }

  .bingo-cell.win-line {
    background: var(--db-green) !important;
    border-color: var(--db-green) !important;
    color: white !important;
    animation: winPulse 0.6s ease infinite alternate;
  }
  @keyframes winPulse {
    0% { transform: scale(1); }
    100% { transform: scale(1.04); }
  }

  /* ── Controls ── */
  .player-controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ── Bingo result banner ── */
  .bingo-banner {
    display: none;
    text-align: center;
    padding: 16px 24px;
    border-radius: var(--radius);
    font-weight: 700;
    font-size: 1.1rem;
    width: 100%;
    max-width: 560px;
  }
  .bingo-banner.win {
    display: block;
    background: var(--db-green-light);
    color: var(--db-green);
  }
  .bingo-banner.no-win {
    display: block;
    background: var(--db-red-light);
    color: var(--db-red);
    animation: shake 0.5s ease;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  /* ── Confetti ── */
  .confetti-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    top: -20px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    #landing h1 { font-size: 1.8rem; }
    .bingo-cell { font-size: 0.6rem; padding: 4px; border-radius: 6px; }
    .bingo-cell.marked::after { width: 7px; height: 7px; top: 3px; right: 3px; }
    .bingo-header-cell { font-size: 1.4rem; }
    .btn-bingo { font-size: 1.1rem; padding: 14px 36px; }
  }
  @media (max-width: 380px) {
    .bingo-cell { font-size: 0.52rem; padding: 3px; }
  }
</style>
</head>
<body>

<!-- ════════ PLAYER VIEW ════════ -->
<div id="player">
  <header>
    <h1>Databricks Bingo</h1>
    <span class="badge">PLAYER</span>
  </header>

  <div class="player-container">
    <div class="bingo-header">
      <div class="bingo-header-cell">B</div>
      <div class="bingo-header-cell">I</div>
      <div class="bingo-header-cell">N</div>
      <div class="bingo-header-cell">G</div>
      <div class="bingo-header-cell">O</div>
    </div>

    <div class="bingo-grid" id="bingoGrid"></div>

    <div class="bingo-banner" id="bingoBanner"></div>

    <div class="player-controls">
      <button class="btn btn-bingo" onclick="checkBingo()">BINGO!</button>
      <button class="btn btn-outline" onclick="newCard()">New Card</button>
    </div>
  </div>
</div>

<script src="questions.js?v=20260501115830"></script>
<script>

// ── State ──
let playerState = {
  card: [],   // 5x5 feature names
  marked: []  // 5x5 booleans
};

// ── Utility ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Card Generation ──
function generateCard() {
  const shuffled = shuffle(ALL_FEATURES);
  const picked = shuffled.slice(0, 24);

  playerState.card = [];
  playerState.marked = [];
  let idx = 0;

  for (let r = 0; r < 5; r++) {
    playerState.card[r] = [];
    playerState.marked[r] = [];
    for (let c = 0; c < 5; c++) {
      if (r === 2 && c === 2) {
        playerState.card[r][c] = 'FREE';
        playerState.marked[r][c] = true;
      } else {
        playerState.card[r][c] = picked[idx++];
        playerState.marked[r][c] = false;
      }
    }
  }

  renderCard();
  clearBingoBanner();
}

function newCard() {
  generateCard();
}

// ── Rendering ──
function renderCard() {
  const grid = document.getElementById('bingoGrid');
  grid.innerHTML = '';

  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      const cell = document.createElement('div');
      cell.className = 'bingo-cell';
      cell.textContent = playerState.card[r][c];
      cell.dataset.row = r;
      cell.dataset.col = c;

      if (r === 2 && c === 2) {
        cell.classList.add('free', 'marked');
      } else {
        if (playerState.marked[r][c]) cell.classList.add('marked');
        cell.addEventListener('click', () => toggleCell(r, c, cell));
      }

      grid.appendChild(cell);
    }
  }
}

function toggleCell(r, c, cellEl) {
  playerState.marked[r][c] = !playerState.marked[r][c];
  cellEl.classList.toggle('marked');
  clearBingoBanner();
  clearWinHighlights();
}

function clearWinHighlights() {
  document.querySelectorAll('.bingo-cell.win-line').forEach(el => el.classList.remove('win-line'));
}

function clearBingoBanner() {
  const banner = document.getElementById('bingoBanner');
  banner.style.display = 'none';
  banner.className = 'bingo-banner';
}

// ── Bingo Detection ──
function checkBingo() {
  clearWinHighlights();

  const lines = [];

  // Rows
  for (let r = 0; r < 5; r++) {
    lines.push([[r,0],[r,1],[r,2],[r,3],[r,4]]);
  }
  // Columns
  for (let c = 0; c < 5; c++) {
    lines.push([[0,c],[1,c],[2,c],[3,c],[4,c]]);
  }
  // Diagonals
  lines.push([[0,0],[1,1],[2,2],[3,3],[4,4]]);
  lines.push([[0,4],[1,3],[2,2],[3,1],[4,0]]);

  const winningLines = [];
  for (const line of lines) {
    if (line.every(([r, c]) => playerState.marked[r][c])) {
      winningLines.push(line);
    }
  }

  const banner = document.getElementById('bingoBanner');

  if (winningLines.length > 0) {
    // Highlight winning cells
    const grid = document.getElementById('bingoGrid');
    const cells = grid.children;
    const winCells = new Set();
    for (const line of winningLines) {
      for (const [r, c] of line) {
        winCells.add(r * 5 + c);
      }
    }
    winCells.forEach(idx => cells[idx].classList.add('win-line'));

    banner.className = 'bingo-banner win';
    banner.textContent = `BINGO! You have ${winningLines.length} winning line${winningLines.length > 1 ? 's' : ''}! Tell the Bingo Master!`;
    banner.style.display = 'block';

    launchConfetti();
  } else {
    banner.className = 'bingo-banner no-win';
    banner.textContent = 'No Bingo yet — keep playing!';
    banner.style.display = 'block';
    setTimeout(() => { banner.style.display = 'none'; }, 2500);
  }
}

// ── Confetti ──
function launchConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);

  const colors = ['#FF3621', '#1B3139', '#FFD700', '#2EA44F', '#FF6B6B', '#4ECDC4', '#45B7D1'];
  const shapes = ['square', 'circle'];

  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const shape = shapes[Math.floor(Math.random() * shapes.length)];
    piece.style.backgroundColor = color;
    piece.style.left = Math.random() * 100 + '%';
    piece.style.width = (Math.random() * 8 + 6) + 'px';
    piece.style.height = (Math.random() * 8 + 6) + 'px';
    piece.style.borderRadius = shape === 'circle' ? '50%' : '2px';
    piece.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    piece.style.animationDelay = (Math.random() * 0.8) + 's';
    container.appendChild(piece);
  }

  setTimeout(() => container.remove(), 4000);
}

// ── Auto-init ──
generateCard();
</script>

</body>
</html>
